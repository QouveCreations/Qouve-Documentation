version: '3.8'

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qouve-documentation
    restart: always
    labels:
      - "coolify.port=5000"
    environment:
      - SITE_BASE_URL=${SERVICE_FQDN}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-mdoc_analytics}
      - DB_USER=${DB_USER:-mdoc_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PATH=${DB_PATH:-api/data/analytics.db}
      - DISCORD_WEBHOOK_URL
      - GITHUB_TOKEN
      - SITE_TITLE=${SITE_TITLE:-Mdoc}
      - SITE_DESCRIPTION=${SITE_DESCRIPTION:-Documentation System}
    volumes:
      - qouve_docs_data:/app/api/data

volumes:
  qouve_docs_data:
    name: qouve_docs_data